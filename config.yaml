# job-hunter-ai configuration
# greenhouse/lever: company board tokens/slugs, from the company's careers
# page URL, e.g. https://boards.greenhouse.io/<token> or https://jobs.lever.co/<slug>
# naukri: search keywords instead of companies -- Naukri doesn't expose
# per-company boards, so these run as keyword searches (see scrapers/naukri.py)
# instahyre: single keyword/phrase per entry -- its API rejects comma-separated
# values, so list each skill/phrase separately (see scrapers/instahyre.py)
# foundit: search keywords like naukri -- also no per-company boards
# (see scrapers/foundit.py)

targets:
  greenhouse:
    - stripe
  lever: []
  naukri:
    - "java spring boot developer"
    - "backend engineer java"
    - "full stack developer java react"
  instahyre:
    - "java"
    - "spring boot"
  foundit:
    - "java spring boot developer"
    - "backend engineer java"

search:
  keywords:
    - "backend engineer"
    - "software engineer"
    - "java developer"
    - "full stack engineer"
  locations:
    - "Remote"
    - "India"
    - "Bengaluru"
  exclude_keywords:
    - "senior staff"
    - "principal"

matcher:
  min_match_percent: 60

paths:
  database: "database/job_hunter.db"
  tracker_excel: "tracker/applications.xlsx"
  resumes_dir: "resumes"
  master_resume: "resumes/master_resume.json"
